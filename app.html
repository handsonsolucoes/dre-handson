<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — FinancePro DRE</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Chart.js e SheetJS para a DRE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh">

<!-- LOADING (visível enquanto valida a sessão) -->
<div id="loading">Verificando acesso…</div>

<!-- CONTEÚDO PRINCIPAL (oculto até sessão válida) -->
<div id="main-content" style="display:none;flex-direction:column;flex:1">

  <!-- Barra superior -->
  <div class="topbar">
    <div class="topbar-brand">FinancePro — DRE</div>
    <div class="topbar-right">
      <span class="topbar-user" id="user-email"></span>
      <a href="admin.html" class="topbar-btn" id="admin-link" style="display:none">⚙ Admin</a>
      <button class="topbar-btn" id="btn-logout">Sair</button>
    </div>
  </div>

  <div class="layout" style="flex:1">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="slabel">Menu</div>
      <a href="#dashboard" class="si active">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="#dre-cc" class="si">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7"/>
        </svg>
        DRE Centro de Custo
      </a>
      <a href="#dre-gerencial" class="si">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        DRE Gerencial
      </a>
      <a href="#producao" class="si">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Produção
      </a>
    </div>

    <!-- Conteúdo principal -->
    <div class="main">
      <!-- Banner de erro (ex: perfil não encontrado) -->
      <div class="error-banner" id="error-banner"></div>

      <!-- Info do usuário -->
      <div class="card">
        <div class="user-info-block">
          <div class="user-avatar" id="user-avatar">?</div>
          <div>
            <div class="user-name" id="user-name">Carregando…</div>
            <div class="user-email" id="user-email-detail"></div>
            <div style="margin-top:5px">
              <span class="badge badge-blue" id="user-role"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Empresas vinculadas -->
      <div class="card">
        <span class="section-label">Empresas vinculadas</span>
        <div class="companies-grid" id="companies-list">
          <p class="text-muted">Carregando empresas…</p>
        </div>
      </div>

      <!-- Placeholder para a DRE (integrar com o módulo existente) -->
      <div class="card" id="dre-section">
        <span class="section-label">DRE — Selecione uma empresa acima para começar</span>
        <p class="text-muted">
          As análises financeiras aparecerão aqui após selecionar uma empresa.
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Atualiza avatar ao carregar nome -->
<script type="module">
  // O app.js já importa requireAuth e cuida de tudo.
  // Aqui apenas conectamos o observer para o avatar.
  const nameEl   = document.getElementById('user-name');
  const avatarEl = document.getElementById('user-avatar');

  // Quando o nome for preenchido pelo app.js, atualiza o avatar
  const obs = new MutationObserver(() => {
    const txt = nameEl.textContent.trim();
    if (txt && txt !== 'Carregando…') {
      avatarEl.textContent = txt.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
      obs.disconnect();
    }
  });
  obs.observe(nameEl, { childList: true, characterData: true, subtree: true });
</script>

<!-- app.js — carrega e protege a página -->
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
