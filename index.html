<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FinancePro DRE</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="login-screen">
  <div class="login-box">
    <div class="login-logo">FinancePro</div>
    <h1 class="login-title">Bem-vindo</h1>
    <p class="login-sub">Painel de Gestão Financeira</p>

    <!-- Mensagem de erro -->
    <div class="login-error" id="login-error" role="alert"></div>

    <!-- Mensagem de sucesso (recuperação de senha) -->
    <div class="login-success" id="login-success" role="status"></div>

    <!-- Formulário de login -->
    <div id="form-login">
      <label class="form-label" for="email">E-mail</label>
      <input
        class="form-input"
        id="email"
        type="email"
        placeholder="seu@email.com"
        autocomplete="email"
        required
      />

      <label class="form-label" for="password">Senha</label>
      <input
        class="form-input"
        id="password"
        type="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />

      <button class="btn-primary" id="btn-login" type="button">
        Entrar
      </button>

      <a class="forgot-link" id="link-forgot" tabindex="0">
        Esqueci minha senha
      </a>
    </div>

    <!-- Formulário de recuperação de senha (oculto por padrão) -->
    <div id="form-reset" style="display:none">
      <p style="font-size:13px;color:#5a5a56;margin-bottom:16px;">
        Informe seu e-mail e enviaremos um link para redefinir sua senha.
      </p>

      <label class="form-label" for="reset-email">E-mail</label>
      <input
        class="form-input"
        id="reset-email"
        type="email"
        placeholder="seu@email.com"
        autocomplete="email"
        required
      />

      <button class="btn-primary" id="btn-reset" type="button">
        Enviar link de recuperação
      </button>

      <a class="forgot-link" id="link-back-login" tabindex="0">
        ← Voltar para o login
      </a>
    </div>
  </div>
</div>

<script type="module">
  import { login, sendPasswordReset, redirectIfLoggedIn } from './assets/js/auth.js';

  // Se já estiver logado, vai direto para o app
  await redirectIfLoggedIn('/app.html');

  const emailInput    = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const btnLogin      = document.getElementById('btn-login');
  const errorEl       = document.getElementById('login-error');
  const successEl     = document.getElementById('login-success');
  const formLogin     = document.getElementById('form-login');
  const formReset     = document.getElementById('form-reset');
  const linkForgot    = document.getElementById('link-forgot');
  const linkBack      = document.getElementById('link-back-login');
  const resetEmailEl  = document.getElementById('reset-email');
  const btnReset      = document.getElementById('btn-reset');

  // Mostra mensagem de erro
  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    successEl.style.display = 'none';
  }

  // Mostra mensagem de sucesso
  function showSuccess(msg) {
    successEl.textContent = msg;
    successEl.style.display = 'block';
    errorEl.style.display = 'none';
  }

  // Limpa mensagens
  function clearMessages() {
    errorEl.style.display = 'none';
    successEl.style.display = 'none';
  }

  // ── LOGIN ──
  async function handleLogin() {
    clearMessages();
    const email    = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showError('Preencha e-mail e senha.');
      return;
    }

    btnLogin.disabled   = true;
    btnLogin.textContent = 'Entrando...';

    const result = await login(email, password);

    if (!result.success) {
      showError(result.message);
      btnLogin.disabled   = false;
      btnLogin.textContent = 'Entrar';
      return;
    }

    // Login com sucesso — redireciona para o app
    window.location.href = '/app.html';
  }

  // Clique no botão ou Enter no campo de senha
  btnLogin.addEventListener('click', handleLogin);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus(); });

  // ── RECUPERAÇÃO DE SENHA ──
  linkForgot.addEventListener('click', () => {
    clearMessages();
    formLogin.style.display = 'none';
    formReset.style.display = 'block';
    // Pré-preenche o e-mail se já digitado
    resetEmailEl.value = emailInput.value;
  });

  linkBack.addEventListener('click', () => {
    clearMessages();
    formReset.style.display = 'none';
    formLogin.style.display = 'block';
  });

  async function handleReset() {
    clearMessages();
    const email = resetEmailEl.value.trim();
    if (!email) { showError('Informe seu e-mail.'); return; }

    btnReset.disabled    = true;
    btnReset.textContent = 'Enviando...';

    const result = await sendPasswordReset(email);

    if (!result.success) {
      showError(result.message);
    } else {
      showSuccess('Link enviado! Verifique sua caixa de entrada (e o spam).');
      formReset.style.display = 'none';
      formLogin.style.display = 'block';
    }

    btnReset.disabled    = false;
    btnReset.textContent = 'Enviar link de recuperação';
  }

  btnReset.addEventListener('click', handleReset);
  resetEmailEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
</body>
</html>
